[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:apache]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[program:whatsapp-gateway]
command=/usr/local/bin/node /var/www/html/whatsapp-gateway/server.js
directory=/var/www/html/whatsapp-gateway
autostart=true
autorestart=true
priority=20
user=www-data
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[program:queue]
command=/bin/sh -lc 'if [ "${RUN_QUEUE_WORKER:-true}" = "true" ]; then exec php artisan queue:work --sleep=3 --tries=3 --timeout=90 --no-interaction; else echo "Queue worker disabled"; exec tail -f /dev/null; fi'
directory=/var/www/html
autostart=true
autorestart=true
priority=30
user=www-data
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[program:scheduler]
command=/bin/sh -lc 'if [ "${RUN_SCHEDULER:-true}" = "true" ]; then exec php artisan schedule:work --no-interaction; else echo "Scheduler disabled"; exec tail -f /dev/null; fi'
directory=/var/www/html
autostart=true
autorestart=true
priority=40
user=www-data
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
